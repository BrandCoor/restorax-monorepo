version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: restorax-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: restorax_user
      POSTGRES_PASSWORD: restorax_secure_password
      POSTGRES_DB: restorax_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - restorax-network

  redis:
    image: redis:7-alpine
    container_name: restorax-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - restorax-network

volumes:
  postgres_data:
  redis_data:

networks:
  restorax-network:
    driver: bridge